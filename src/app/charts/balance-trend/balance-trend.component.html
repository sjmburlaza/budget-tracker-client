<div class="text-center">
    <h1 class="my-4">Balance Trend</h1>
    <p-calendar [(ngModel)]="rangeDates" 
        selectionMode="range" 
        [readonlyInput]="true" 
        inputId="range" 
        placeholder="Select Date"
        [showIcon]="true"
        (onSelect)="onSelect()">
    </p-calendar>
    <div class="col-lg-6 offset-lg-3 my-4">
        <canvas id="lineChart" height="400">{{chart}}</canvas>
    </div>
</div>
