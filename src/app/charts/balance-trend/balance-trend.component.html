<div class="">
    <div class="row mb-4 mt-3 col-lg-8 offset-lg-2">
        <div class="col-6">
            <h2 class="">Balance Trend</h2>
        </div>
        <div class="col-4">
            <p-calendar [(ngModel)]="rangeDates" 
                selectionMode="range" 
                [readonlyInput]="true" 
                inputId="range" 
                placeholder="Select Date"
                [showIcon]="true"
                (onSelect)="onSelect()">
            </p-calendar>
        </div>
        <div class="col-2">
            <button id="btn" type="button" class="btn btn-info" (click)="populateChart()" style="height: 100%;">
                Show Data
            </button>
        </div>
    </div>
    <div class="col-lg-8 offset-lg-2 my-4 text-center">
        <canvas #myCanvas id="lineChart" height="400">{{chart}}</canvas>
    </div>
</div>
