<div class="text-center">
    <h1 class="my-4">Balance Trend</h1>
    <p-calendar [(ngModel)]="rangeDates" 
        selectionMode="range" 
        [readonlyInput]="true" 
        inputId="range" 
        placeholder="Select Date"
        [showIcon]="true"
        (onSelect)="onSelect()">
    </p-calendar>
    <div class="my-5"></div>
    <div style="display: block;">
        <canvas id="lineChart" width="400" height="400">{{chart}}</canvas>
    </div>
</div>
