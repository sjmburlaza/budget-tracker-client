<div class="">
    <div class="mb-4 mt-3 col-md-6 offset-md-3 d-flex justify-content-between">
        <h2 class="">Category Breakdown</h2>
        <div class="">
            <p-calendar [(ngModel)]="rangeDates" 
                selectionMode="range" 
                [readonlyInput]="true" 
                inputId="range" 
                placeholder="Select Date"
                [showIcon]="true"
                (onSelect)="onSelect()">
            </p-calendar>
        </div>
    </div>
    <div class="row col-lg-6 offset-lg-3 my-4">
        <div class="col-6">
            <div style="display: block;">
                <canvas id="incomePieChart" width="400" height="400">{{incomePieChart}}</canvas>
            </div>
        </div>
        <div class="col-6">
            <div style="display: block;">
                <canvas id="expensePieChart" width="400" height="400">{{expensePieChart}}</canvas>
            </div>
        </div>
    </div>
</div>
