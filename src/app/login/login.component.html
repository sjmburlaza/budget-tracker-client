<div class="container py-md-2">
    <div class="col-lg-4 offset-lg-4 py-md-2">
        <h2 class="text-center pb-3">Sign in to your PocketGuard account.</h2>
        <div class="">
            <img src="../../assets/images/bear-profile.png" alt="" height="150px">
            <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
                <div class="form-group my-2">
                    <input type="email" class="form-control" name="email" placeholder="Email" [(ngModel)]="form.email" required #email="ngModel">
                    <div class="alert-danger" role="alert" *ngIf="email.errors && f.submitted">
                        Email is required!
                    </div>
                </div>
                <div class="form-group my-2">
                    <input type="password" class="form-control" name="password" placeholder="Password" [(ngModel)]="form.password" required minlength="6" #password="ngModel">
                    <div class="alert-danger" role="alert" *ngIf="password.errors && f.submitted">
                        <div *ngIf="password.errors['required']">Password is required</div>
                        <div *ngIf="password.errors['minlength']">Password must be at least 6 characters</div>
                    </div>
                </div>
                <div class="form-group my-4">
                    <button type="submit" class="btn btn-primary">Sign-in</button>
                </div>
                <div class="form-group">
                    <div class="alert alert-danger" role="alert" *ngIf="f.submitted && isLoginFailed">
                        Login failed: {{ errorMessage }}
                    </div>
                </div>
            </form>
            <div class="alert alert-success" *ngIf="isLoggedIn">
                Welcome!
            </div>
        </div>
        <div class="text-center">
            <p>Don't have an account yet? <a routerLink="/register">Sign-up</a></p>
        </div>
    </div>
</div>
