<div class="container col-md-8">
    <h2>My Records</h2>
    <hr>
    <p-table [value]="records" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Created On</th>
                <th>Type</th>
                <th>Name</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Balance</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-record>
            <tr>
                <td>{{record.createdOn}}</td>
                <td>{{record.type}}</td>
                <td>{{record.name}}</td>
                <td>{{record.description}}</td>
                <td>{{record.amount}}</td>
                <td>{{record.balance}}</td>
                <td><button class="btn btn-sm button-delete">X</button></td>
            </tr>
        </ng-template>
    </p-table>

    <!-- <button type="button" class="btn btn-light my-5" (click)="show()">Add New Record</button> -->
</div>
