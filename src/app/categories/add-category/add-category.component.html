<div class="card text-center p-4">
    <h4>Add New Category</h4>
    <form name="form" *ngIf="!isSuccessful" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
        <div class="form-group my-2">
            <select type="select" name="type" class="form-control form-select" [(ngModel)]="form.type" required #type="ngModel">
                <option [ngValue]="null" disabled selected>Select Type</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>
        </div>
        <div class="form-group my-2">
            <input type="text" class="form-control" name="name" placeholder="Name" [(ngModel)]="form.name" required #name="ngModel">
        </div>
        <div class="form-group my-2">
            <button type="submit" class="btn btn-primary mx-1">Submit</button>
            <button type="button" class="btn btn-light mx-1" (click)="close()">Close</button>
        </div>
    </form>
</div>
