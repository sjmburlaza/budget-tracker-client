<div class="container col-md-6">
    <h2 class="text-center">Categories</h2>
    <div class="d-flex flex-row-reverse">
        <button type="button" class="btn btn-light" (click)="createNew()">Add Category</button>
    </div>
    <hr>
    <p-table [value]="categories" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Type</th>
                <th>Name</th>
                <th class="text-center">Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-category>
            <tr>
                <td>{{category.type}}</td>
                <td>{{category.name}}</td>
                <td class="text-center">
                    <button type="button" class="btn btn-outline-dark border-0" (click)="updateCategory(category)">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
<p-dialog [(visible)]="categoryDialog"
    [style]="{width: '450px'}"
    [modal]="true"
    [closable]="false"
    styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="card text-center p-4">
            <h4 *ngIf="isNew">Add New Category</h4>
            <h4 *ngIf="isForUpdate">Update Category</h4>
            <form name="form" *ngIf="!isSuccessful" name="form" 
                (ngSubmit)="f.form.valid && onSubmit()" 
                #f="ngForm" 
                novalidate>
                <div class="form-group my-2">
                    <select type="select" 
                        name="type" 
                        class="form-control form-select" 
                        [(ngModel)]="category.type" 
                        required 
                        #type="ngModel">
                        <option [ngValue]="null" disabled selected>Select Type</option>
                        <option value="Income">Income</option>
                        <option value="Expense">Expense</option>
                    </select>
                </div>
                <div class="form-group my-2">
                    <input type="text" 
                        class="form-control" 
                        name="name" 
                        placeholder="Name" 
                        [(ngModel)]="category.name" 
                        required 
                        #name="ngModel">
                </div>
                <div class="form-group my-2">
                    <button type="submit" class="btn btn-primary mx-1">Submit</button>
                    <button type="button" class="btn btn-light mx-1" (click)="close()">Cancel</button>
                </div>
            </form>
        </div>
    </ng-template>
</p-dialog>
