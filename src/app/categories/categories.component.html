<h2>Categories</h2>
<p-table [value]="categories" responsiveLayout="scroll">
    <ng-template pTemplate="header">
        <tr>
            <th>ObjID</th>
            <th>Name</th>
            <th>Type</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
        <tr>
            <td>{{category.objID}}</td>
            <td>{{category.name}}</td>
            <td>{{category.type}}</td>
        </tr>
    </ng-template>
</p-table>
